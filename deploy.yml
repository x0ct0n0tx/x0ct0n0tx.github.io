name: Go Pongo

on:
    push:
        branches: [main]
    workflow_dispatch:

# OpenID Connect
permissions:
    contents: read
    pages: write
    id-token: write

# Single deployment
concurrency:
    group: pages
    cancel-in-progress: false

    with:
        go-version: "1.24"
    # Go -> WebAssembly for js/wasm

    # Upload to pages