name: Go Pongo

on:
    push:
        branches: [main]
    workflow_dispatch:

# OpenID Connect
permissions:
    contents: read
    pages: write
    id-token: write

# Single deployment
concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build-and deploy:
    runs-on: ubuntu-latest
    environment:
        name: github-pages
        url: ${{steps.deploy.outpus.page_url}}

    steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up Go
          uses: actions/setup-go@v5      
          with:
            go-version: "1.24"
    
    # Go -> WebAssembly for js/wasm
        - name: Build WASM 
          run: GOOS=js GOARCH=wasm go build -o main.wasm .

      # browser can find it at the same URL path.
        - name: Copy wasm_exec.js
          run: cp "$(go env GOROOT)/misc/wasm/wasm_exec.js" .

      # Upload everything in the repo root (index.html, main.wasm, wasm_exec.js)
        - name: Upload Pages artifact
          uses: actions/upload-pages-artifact@v3
          with:
            path: "."

        - name: Deploy to GitHub Pages
          id: deploy
          uses: actions/deploy-pages@v4