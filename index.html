<!DOCTYPE html>
<html lang= "en">

    <head>
    <meta charset = "UTF-8" />
    <meta name = "viewport" content = "width=device-width, initial-scale = 1.0" />
    <title>Pon-Go</title>
        
        <style>
            body {
                background: #07070f;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                font-family: 'Courier New', Courier, monospace;
                color: #fff;
            }

            #wrapper {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 16px;    
            }

            canvas {
                display: block;
                border: 2px solid rgba(255,255,255, 0.1);
                border-radius: 5px;
                box-shadow: 0 0 40px rgba(233,70,95, 0.15),
                            0 0 80px rgba(25,200,155, 0.08);;
                max-width: 100vw;
            }

            #status {
                font-size: 12px;
                color: rgba(255,255,255, 0.2) ;
                letter-spacing: 2px;
                min-height: 20px;        
            }
            
            #status.error {
                color: #e94560;
            }

            #spinnter {
                width: 32px;
                height: 32px;
                border: 2px solid rgba(255,255,255, 0.1);
                border-top-color: #e94560;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }

            @keyframe spin {
                to {
                    transform: rotate(360deg);
                }
            }

        </style>
    
    </head>

    <body>
        <div id=""wrapper">
        <div id="spinner"></div>    
        <canvas id="gameCanvas"></canvas>
        <div id="status">LOADING...</div>
        </div>

        <script src ="wasm_exec.js"></script>
        <script>
            const status = document.getElementById('status');
            const spinner = document.getElementById('spinner');

            async function loadGame() {
                try {
                    const go = new Go();
                    const result = await WebAssembly.instantiateStreaming(
                        fetch('main.wasm'),
                        go.importObject
                    );
                    
                    spinner.remove();
                    status.textContent = '';
                    go.run(result.instance);
                } catch (err) {
                    spinner.remove();
                    status.classList.add('error');
                    status.textContent = 'Failed to load: ' + err.message;
                    console.error(err)
                }
            }

            loadGame();

        </script>
    </body>

</html>
